name: Setup
description: 'Installs node, driver dependencies, and builds source'

runs:
  using: composite
  steps:
    - run: echo "hey sweetie"
      shell: bash

    - run: |
        curl -sS -I -H "Authorization: Bearer ${{github.token}}" https://api.github.com/ | grep -iE '^x-oauth-scopes:'
      shell: bash

    - run: | 
        curl -sS -I -H "Authorization: Bearer ${{github.token}}" -H "Accept: application/vnd.github+json" -H "X-GitHub-Api-Version: 2022-11-28" https://api.github.com/repos/OWNER/REPO/contents/README.md | grep -i x-accepted-github-permissions
      shell: bash


